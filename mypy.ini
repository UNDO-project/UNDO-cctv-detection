[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
strict_equality = True
exclude = (?x)(
    ^src/tools/  # Exclude archived tools directory
    )

[mypy-ultralytics.*]
ignore_missing_imports = True

[mypy-gradio.*]
ignore_missing_imports = True

[mypy-playwright.*]
ignore_missing_imports = True

[mypy-pillow_heif.*]
ignore_missing_imports = True

[mypy-loguru.*]
ignore_missing_imports = True

[mypy-torch.*]
ignore_missing_imports = True

[mypy-torchvision.*]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-dotenv.*]
ignore_missing_imports = True

[mypy-src.infrastructure.data_loaders]
allow_untyped_defs = True

[mypy-src.infrastructure.dataset_preparer_impl]
# Type mismatch between sklearn's list returns and Dataset types - pre-existing issue
warn_return_any = False

[mypy-tests.*]
allow_untyped_defs = True